# Anthill daemon in a docker-compose deployment.
#
# Recommended bring-up (CLI-first, config persists in the volume):
#
#   1. docker compose up -d                   # start with empty config
#   2. docker compose exec anthill anthill model add deepseek \
#        --provider deepseek --model deepseek-chat \
#        --key sk-... --set-default
#   3. docker compose exec anthill anthill channel add larkbot \
#        --kind lark --app-id cli_... --app-secret ...
#   4. Point each bot's webhook at http://your-host:8765/<channel>/webhook
#
# The model + channel config is written to ~/.anthill/secrets.toml inside
# the volume, so step 2-3 only need to run once. Subsequent `docker
# compose up -d` invocations inherit everything.
#
# For CI / scripted deployments you can also seed config via .env vars
# (see .env.example) — the daemon reads CLI config first and falls back
# to env vars when nothing is configured.
#
# State (nations, pheromones, history, secrets) lives in the named
# volume `anthill-state` and survives container restarts.

version: "3.9"

services:
  anthill:
    build: .
    image: anthill-agent:0.1.8
    container_name: anthill
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      ANTHILL_DAEMON_NATION: ${ANTHILL_DAEMON_NATION:-default}
      ANTHILL_DAEMON_HOST: 0.0.0.0
      ANTHILL_DAEMON_PORT: 8765
    volumes:
      - anthill-state:/home/anthill/.anthill
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/health').read()\""
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  anthill-state:
