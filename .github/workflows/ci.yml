name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Mirror the supported Python range in pyproject.toml.
        # Keep 3.9 because it's still on long-tail distros / managed Macs.
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + all test deps
        run: |
          python -m pip install --upgrade pip
          # Install with [dev,daemon,docs] so every test in tests/ has the
          # imports it needs. [browser] is skipped — playwright is heavy
          # and its tests use lazy imports + skip-when-missing.
          pip install -e ".[dev,daemon,docs]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Test (pytest)
        # --tb=long so the first CI failure produces enough trace to
        # diagnose remotely. Drop back to --tb=short once stable.
        run: |
          pytest tests/ -v --tb=long 2>&1 | tee /tmp/pytest-${{ matrix.python-version }}.log
          # Preserve the return code from pytest, not from tee.
          exit ${PIPESTATUS[0]}

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}
          path: /tmp/pytest-${{ matrix.python-version }}.log
          retention-days: 7

  smoke:
    # Offline smoke test exercises the CLI surface end-to-end without
    # needing any provider API keys. Skipped by Python matrix — one run
    # is enough.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          # Smoke test exercises only CLI surface — no need for [docs] / [browser].
          pip install -e ".[daemon]"
      - name: Smoke test (offline)
        run: |
          bash scripts/smoke-test.sh 2>&1 | tee /tmp/smoke.log
          exit ${PIPESTATUS[0]}

      - name: Upload smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: /tmp/smoke.log
          retention-days: 7
