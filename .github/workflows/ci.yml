name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Mirror the supported Python range in pyproject.toml.
        # Keep 3.9 because it's still on long-tail distros / managed Macs.
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # Editable install picks up source changes; .[dev] adds pytest+ruff.
          # If pyproject doesn't yet declare a [dev] extra, fall back to a
          # minimal install — same result, just less explicit.
          pip install -e ".[dev]" || pip install -e . pytest pytest-asyncio ruff

      - name: Lint (ruff)
        run: ruff check src/

      - name: Test (pytest)
        run: pytest tests/ -v --tb=short

  smoke:
    # Offline smoke test exercises the CLI surface end-to-end without
    # needing any provider API keys. Skipped by Python matrix — one run
    # is enough.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Smoke test (offline)
        run: bash scripts/smoke-test.sh
