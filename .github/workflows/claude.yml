name: Claude Auto Fix

on:
  issues:
    types: [opened, labeled, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Only trigger when:
    # 1. An issue is labeled `claude-fix`
    # 2. A new issue is opened with `claude-fix` already on it
    # 3. Any comment/review contains `@claude`
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude-fix') ||
      (github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'claude-fix')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))

    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,daemon,docs]"

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Allow Claude to run tests & lint while working
          allowed_tools: "Bash(pytest:*),Bash(ruff:*),Bash(python:*),Bash(pip:*),Edit,Write,Read"
          # Custom instructions per repo
          claude_args: |
            --append-system-prompt "You are working on the anthill-agent Python project. Before opening a PR: run `ruff check src/ tests/` and `pytest tests/ -v` and make sure they pass. Keep changes minimal and focused on the issue."
